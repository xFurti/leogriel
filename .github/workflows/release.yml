name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Exact version already prepared in the repository
        required: true
        type: string
      publish:
        description: Publish packages, tag, and create the GitHub Release
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  check-and-pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11.8.0
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
      - name: Verify requested version
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          node --input-type=module -e "import pkg from './package.json' with { type: 'json' }; if (pkg.version !== process.env.RELEASE_VERSION) throw new Error('Requested version does not match package.json');"
          if git ls-remote --exit-code --tags origin "refs/tags/v$RELEASE_VERSION" >/dev/null 2>&1; then
            echo "Tag v$RELEASE_VERSION already exists" >&2
            exit 1
          fi
      - run: pnpm install --frozen-lockfile
      - run: node scripts/release-check.mjs
      - uses: actions/upload-artifact@v7
        with:
          name: skillctl-${{ inputs.version }}-packages
          path: artifacts/${{ inputs.version }}/*.tgz
          if-no-files-found: error

  publish:
    if: ${{ inputs.publish }}
    needs: check-and-pack
    runs-on: ubuntu-latest
    environment: npm-production
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - name: Require the main branch
        if: ${{ github.ref != 'refs/heads/main' }}
        run: |
          echo "Publishing is only allowed from main (current ref: $GITHUB_REF)" >&2
          exit 1
      - uses: pnpm/action-setup@v6
        with:
          version: 11.8.0
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - uses: actions/download-artifact@v8
        with:
          name: skillctl-${{ inputs.version }}-packages
          path: artifacts/${{ inputs.version }}
      - name: Publish or verify packages in dependency order
        env:
          VERSION: ${{ inputs.version }}
        run: node scripts/publish-release.mjs "$VERSION"
      - name: Tag and create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git tag -a "v$VERSION" -m "skillctl v$VERSION"
          git push origin "v$VERSION"
          node scripts/extract-release-notes.mjs "$VERSION" > release-notes.md
          gh release create "v$VERSION" "artifacts/$VERSION"/*.tgz --title "skillctl v$VERSION" --notes-file release-notes.md --verify-tag
