name: Catalog contract

on:
  schedule:
    - cron: '17 5 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  skills-sh:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Check the public skills.sh search contract
        run: |
          node --input-type=module <<'EOF'
          const response = await fetch('https://skills.sh/api/search?q=typescript&limit=1', {
            signal: AbortSignal.timeout(8000),
            headers: { 'user-agent': 'skillctl-contract-test' },
          });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const body = await response.json();
          if (!Array.isArray(body.skills)) throw new Error('Expected a skills array');
          for (const skill of body.skills) {
            if (typeof skill.id !== 'string' || typeof skill.name !== 'string' || typeof skill.source !== 'string') {
              throw new Error('Catalog entry does not match the supported contract');
            }
          }
          EOF
