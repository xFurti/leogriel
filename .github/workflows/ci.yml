name: CI

on:
  push:
    branches: [main, 'execute-plan/*']
  pull_request:
    branches: [main]

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: ['22.13', '24']
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Type check
        run: pnpm -r lint

      - name: Test
        run: pnpm test

      - name: Coverage
        run: pnpm test:coverage

      - name: Verify CLI
        run: node packages/cli/bin/skillctl.js --version

      - name: Functional smoke
        shell: bash
        run: |
          set -euo pipefail
          CLI="$GITHUB_WORKSPACE/packages/cli/bin/skillctl.js"
          WORK="$RUNNER_TEMP/skillctl-smoke"
          mkdir -p "$WORK/.ci-skill"
          cd "$WORK"
          printf '%s\n' '---' 'name: ci-smoke' '---' 'Test skill for CI.' > .ci-skill/SKILL.md
          node "$CLI" init
          node "$CLI" add file:./.ci-skill
          node "$CLI" list
          node "$CLI" doctor --json > doctor.json
          node --input-type=commonjs -e "const d=JSON.parse(require('fs').readFileSync('doctor.json','utf8')); if(!d.manifestPresent) process.exit(1); console.log('doctor ok:', d.status);"
          node "$CLI" audit --strict
          node "$CLI" skill validate "$GITHUB_WORKSPACE/skills/skillctl" --json

  publish-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0
      - uses: actions/setup-node@v4
        with:
          node-version: '22.13'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm audit --prod
      - name: Verify all publishable artifacts
        run: node scripts/pack-all.mjs
