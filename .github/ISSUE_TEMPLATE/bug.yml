name: Bug report
description: Report reproducible Leogriel behavior without including credentials or private skill contents.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not report security vulnerabilities here. Follow SECURITY.md and remove secrets, authentication data, and private repository contents.
  - type: input
    id: version
    attributes:
      label: Leogriel version
      placeholder: 1.0.0-beta.3
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Operating system, Node version, package manager, and relevant agent/runner version.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include commands, sanitized manifest/lock fragments, expected behavior, and actual behavior.
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Redacted diagnostics
      description: Add doctor/audit JSON only after removing private paths and verifying that no secret remains.
  - type: checkboxes
    id: checks
    attributes:
      label: Safety checks
      options:
        - label: I removed API keys, tokens, cookies, authentication profiles, and private skill contents.
          required: true
        - label: This is not a security vulnerability.
          required: true
